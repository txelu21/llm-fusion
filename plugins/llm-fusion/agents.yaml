# LLM Fusion — council roster.
#
# TWO rosters, because the two modes want different kinds of diversity:
#   advise_agents  -> diversity of PERSPECTIVE  (different lenses, mixed models)
#   execute_agents -> diversity of MODEL only   (one shared builder role; the
#                     point is to see how each model executes the SAME task,
#                     then the judge fuses the best of each)
#
# Subset YAML only (maps + lists of inline {flow} mappings).

defaults:
  round1_timeout_sec: 300
  judge_timeout_sec: 360
  executor_timeout_sec: 900
  retries: 1
  quorum: 2

# handoff = the main Claude Code session is the Judge (default).
# auto    = runner spawns a fresh judge CLI (headless / unattended runs).
judge:
  backend: handoff
  cli: claude
  model: opus

# execute mode: the autonomous executor is codex-only (the only CLI with a real
# OS seatbelt). Auditor is a different model on purpose.
executor:
  cli: codex
  model: gpt-5.5
auditor:
  cli: antigravity
  model: gemini-3.1-pro-preview

# ---- ADVISE: the council of perspectives (7 lenses across 5 models) ----------
# Each model wears a DIFFERENT lens. Any lens can ride any model — this pairing
# is editable; the only hard rule is >=3 distinct models. Providers: claude,
# codex, antigravity, grok (4 vendors; claude runs as opus + sonnet -> 5 models).
advise_agents:
  - { name: claude-architect,       cli: claude, model: opus,           role: roles/architect.md }
  - { name: codex-pragmatist,       cli: codex,  model: gpt-5.5,        role: roles/pragmatist.md }
  - { name: antigravity-skeptic,    cli: antigravity, model: gemini-3.1-pro-preview, role: roles/skeptic.md }
  - { name: claude-firstprinciples, cli: claude, model: claude-sonnet-5, role: roles/first-principles.md }
  - { name: antigravity-operator,   cli: antigravity, model: gemini-3.1-pro-preview, role: roles/operator.md }
  - { name: codex-useradvocate,     cli: codex,  model: gpt-5.5,        role: roles/user-advocate.md }
  - { name: grok-realist,           cli: grok,   model: grok-composer-2.5-fast, role: roles/realist.md }

# ---- EXECUTE: the build-off (SAME role, one per distinct model) --------------
# Identical builder role; the diversity IS the model. Judge fuses the best of
# each into one spec, then the executor builds it. Keep models distinct here
# (same role + same model = redundant). grok PLANS here like the others — it
# never executes; the autonomous executor stays codex-only (see executor:).
execute_agents:
  - { name: claude-builder, cli: claude, model: opus,           role: roles/builder.md }
  - { name: codex-builder,  cli: codex,  model: gpt-5.5,        role: roles/builder.md }
  - { name: antigravity-builder, cli: antigravity, model: gemini-3.1-pro-preview, role: roles/builder.md }
  - { name: grok-builder,   cli: grok,   model: grok-composer-2.5-fast, role: roles/builder.md }
